<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrucci Web</title>
    <link rel="icon" href="images/Petrucci_favicon.svg" type="image/x-icon">

    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/uvod.css">
    <link rel="stylesheet" href="css/citaty.css">
</head>
<body>
    <header>
        <div class="left-header">
            <a href="index.html">
                <img class="logo-header" src="images/logo-bila.svg" alt="logo-header">
            </a>
        </div>
        <!--desktop menu-->  
        <div class="right-header">
            <button class="button-header">
                <a href="index.html" class="button-header-a">Úvod</a>
            </button>
            <button class="button-header">
                <a href="nase-vino.html" class="button-header-a">Naše víno</a>
            </button>
            <button class="button-header">
                <a href="o-nas.html" class="button-header-a">O nás</a>
            </button>
            <button class="button-header">
                <a href="zdislava.html" class="button-header-a">Zdislava</a>
            </button>
            <button class="button-header">
                <a href="kontakt.html" class="button-header-a">Kontakt</a>
            </button>
        </div>

        <!--mobile menu-->
        <div id="hamburger" onclick="toggleMenu()">☰</div>

    </header>
        <!--mobile menu content-->
    <div class="menu" id="menu">
        <div id="menu-buttons">
            <button class="button-header">
                <a href="index.html" class="button-header-a">Úvod</a>
            </button>
            <button class="button-header">
                <a href="nase-vino.html" class="button-header-a">Naše víno</a>
            </button>
            <button class="button-header">
                <a href="o-nas.html" class="button-header-a">O nás</a>
            </button>
            <button class="button-header">
                <a href="zdislava.html" class="button-header-a">Zdislava</a>
            </button>
            <button class="button-header">
                <a href="kontakt.html" class="button-header-a">Kontakt</a>
            </button>
        </div>
    </div>
    
    <!--uvod-->
    <section id="intro-screen">
        <div id="intro-background">
            <img src="images/rybiz.png" alt="rybiz" id="background-image">
            <img src="images/flaska_vina6.png" alt="flaska_vina" id="bottle-image">
            <div id="intro-headings">
                <p id="intro-title2">Vigneta</p> 
                <p id="intro-title1">Pet&nbsp;rucci</p>
                <p id="intro-title3">Fratelli</p>
            </div>
        </div>
    </section>
    <section id="intro-secondary-screen">
        <div id="intro-background-secondary">
            <h2 id="intro-secondary-heading"></h2>
            <p id="intro-secondary-text"></p>
        </div>
    </section>


    <section class="carousel-container">
        <button class="carousel-btn prev-btn">&#10094;</button>
        <button class="carousel-btn next-btn">&#10095;</button>

        <div class="carousel-track-wrapper">
            <div class="carousel-track">
            
            <div class="carousel-card">
                <p class="quote-it">"La vita è bella."</p>
                <hr class="separator">
                <p class="quote-cz">Život je krásný.</p>
            </div>

            <div class="carousel-card">
                <p class="quote-it">"Il mattino ha l'oro in bocca."</p>
                <hr class="separator">
                <p class="quote-cz">Ranní ptáče dál doskáče.</p>
            </div>

            <div class="carousel-card">
                <p class="quote-it">"Chi si ferma è perduto."</p>
                <hr class="separator">
                <p class="quote-cz">Kdo se zastaví, je ztracen.</p>
            </div>

            <div class="carousel-card">
                <p class="quote-it">"L'amore vince sempre."</p>
                <hr class="separator">
                <p class="quote-cz">Láska vždy zvítězí.</p>
            </div>

            <div class="carousel-card">
                <p class="quote-it">"Dolce far niente."</p>
                <hr class="separator">
                <p class="quote-cz">Sladké nicnedělání.</p>
            </div>

            </div>
        </div>

        <div class="carousel-dots">
            <button class="dot active"></button>
            <button class="dot"></button>
            <button class="dot"></button>
            <button class="dot"></button>
            <button class="dot"></button>
        </div>
    </section>
    <script src="javascript/menu.header.js"></script>
    <script src="javascript/citaty.js"></script>
</body>
</html>
